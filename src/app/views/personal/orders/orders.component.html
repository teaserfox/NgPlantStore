<div class="orders">
  <div class="container">

    <div class="personal-title">
      Личный кабинет
    </div>
    <div class="personal-pages-selector">
      <div class="personal-page" routerLink="/profile">
        Личные данные
      </div>
      <div class="personal-page active">
        Ваши заказы
      </div>
    </div>

    <div class="orders-title">
      Ваши заказы
    </div>
    <div class="orders-title-additional">
      Здесь отображается история ваших заказов.
    </div>

    <div class="orders-list" *ngIf="orders && orders.length > 0">
      <div class="orders-list-item" *ngFor="let order of orders; let i = index">
        <div class="orders-list-item-number">Заказ №{{ i + 1 }}</div>
        <div class="orders-list-item-products" *ngIf="order.items && order.items.length > 0">
          <div class="orders-list-item-products-count">Кол-во товаров: {{order.items.length}}</div>

          <table class="orders-list-item-product-list">
            <tr *ngFor="let item of order.items">
              <td>&#183; {{item.name}}</td>
              <td>{{item.quantity}} шт.</td>
            </tr>
          </table>
        </div>

        <div class="orders-list-item-status">
          {{order.status}}
        </div>

        <div class="orders-list-item-price">
          {{order.totalAmout}} BYN
        </div>

      </div>
    </div>


  </div>
</div>
